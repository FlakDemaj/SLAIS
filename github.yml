name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: 9.0.x

jobs:

  code-style:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Check Code Style
        run: dotnet format --verify-no-changes --severity error

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: code-style
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore --configuration Release

  domain-tests:
    name: Domain Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Run Domain Tests
        run: dotnet test Tests/Domain.Tests \
          --no-restore \
          --configuration Release \
          --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        with:
          name: domain-coverage
          path: '**/coverage.cobertura.xml'

  application-tests:
    name: Application Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Run Application Tests
        run: dotnet test Tests/Application.Tests \
          --no-restore \
          --configuration Release \
          --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        with:
          name: application-coverage
          path: '**/coverage.cobertura.xml'

  infrastructure-tests:
    name: Infrastructure Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Run Infrastructure Tests
        run: dotnet test Tests/Infrastructure.Tests \
          --no-restore \
          --configuration Release \
          --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        with:
          name: infrastructure-coverage
          path: '**/coverage.cobertura.xml'

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Run API Tests
        run: dotnet test Tests/API.Tests \
          --no-restore \
          --configuration Release \
          --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: '**/coverage.cobertura.xml'

  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    needs: [ domain-tests, application-tests, infrastructure-tests, api-tests ]
    steps:
      - uses: actions/checkout@v4
      - name: Download all Coverage Reports
        uses: actions/download-artifact@v4
      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool
      - name: Generate Report
        run: reportgenerator \
          -reports:./**/coverage.cobertura.xml \
          -targetdir:./coverage/report \
          -reporttypes:Cobertura
      - name: Enforce 80% Coverage
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/report/Cobertura.xml
          badge: true
          fail_below_min: true
          thresholds: '80 90'

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: coverage
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
