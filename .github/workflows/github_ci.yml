name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  checks: write
  pull-requests: write
  contents: read

env:
  DOTNET_VERSION: 10.0.x

jobs:

  # =====================
  # Code Style
  # =====================
  code-style:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Check Code Style
        run: dotnet format --verify-no-changes --severity error

  # =====================
  # Build
  # =====================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: code-style
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release

  # =====================
  # Domain Tests
  # =====================
  domain-tests:
    name: Domain Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - name: Run Domain Tests
        run: |
          dotnet test Domain.Tests \
            --configuration Release \
            --logger "trx;LogFileName=Domain.TestResults.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Domain Test Results
          path: './TestResults/Domain.TestResults.trx'
          reporter: dotnet-trx
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: domain-coverage
          path: './TestResults/**/coverage.cobertura.xml'
          if-no-files-found: warn

  # =====================
  # Application Tests
  # =====================
  application-tests:
    name: Application Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - name: Run Application Tests
        run: |
          dotnet test Application.Tests \
            --configuration Release \
            --logger "trx;LogFileName=Application.TestResults.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Application Test Results
          path: './TestResults/Application.TestResults.trx'
          reporter: dotnet-trx
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: application-coverage
          path: './TestResults/**/coverage.cobertura.xml'
          if-no-files-found: warn

  # =====================
  # Infrastructure Tests
  # =====================
  infrastructure-tests:
    name: Infrastructure Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - name: Run Infrastructure Tests
        run: |
          dotnet test Infrastructure.Tests \
            --configuration Release \
            --logger "trx;LogFileName=Infrastructure.TestResults.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Infrastructure Test Results
          path: './TestResults/Infrastructure.TestResults.trx'
          reporter: dotnet-trx
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: infrastructure-coverage
          path: './TestResults/**/coverage.cobertura.xml'
          if-no-files-found: warn

  # =====================
  # Presentation Tests
  # =====================
  presentation-tests:
    name: Presentation Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - name: Run Presentation Tests
        run: |
          dotnet test Presentation.Tests \
            --configuration Release \
            --logger "trx;LogFileName=Presentation.TestResults.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Presentation Test Results
          path: './TestResults/Presentation.TestResults.trx'
          reporter: dotnet-trx
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: presentation-coverage
          path: './TestResults/**/coverage.cobertura.xml'
          if-no-files-found: warn

  # =====================
  # Codacy Analysis + Coverage
  # =====================
  codacy-analysis:
    name: Codacy Analysis
    runs-on: ubuntu-latest
    needs: [domain-tests, application-tests, infrastructure-tests, presentation-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Download all Coverage Artifacts
        uses: actions/download-artifact@v4

      - name: Collect Coverage Paths
        id: collect
        run: |
          FILES=$(find . -name "coverage.cobertura.xml" | tr '\n' ',')
          FILES=${FILES%,}
          echo "Found coverage files: $FILES"
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Upload Coverage to Codacy
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: ${{ steps.collect.outputs.files }}
