name: CI

on:
  push:
    branches:
      - '**'  # Alle Feature-Branches
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch, in den gemerged werden soll'
        required: true
        default: 'master'

env:
  DOTNET_VERSION: 10.0.x

jobs:

  build-and-test:
    name: Build & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release
      - name: Run All Tests & Collect Coverage
        run: |
          for proj in **/*.Tests/*.csproj; do
            echo "Testing $proj"
            dotnet test "$proj" --configuration Release --collect:"XPlat Code Coverage" || true
          done
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: '**/coverage.cobertura.xml'

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: build-and-test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.cs.opencover.reportsPaths=coverage/**/*.cobertura.xml

  merge:
    name: Manual Merge to Target Branch
    runs-on: ubuntu-latest
    needs: [build-and-test, sonarcloud]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set Target Branch
        run: |
          echo "Merging current branch into ${{ github.event.inputs.target_branch }}"
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git checkout ${{ github.event.inputs.target_branch }}
          git merge $GITHUB_REF_NAME --no-ff -m "Manual merge from $GITHUB_REF_NAME"
          git push origin ${{ github.event.inputs.target_branch }}
