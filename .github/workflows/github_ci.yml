name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  checks: write
  pull-requests: write
  contents: read

env:
  DOTNET_VERSION: 10.0.x

jobs:

  # =====================
  # Code Style
  # =====================
  code-style:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Check Code Style
        run: dotnet format --verify-no-changes --severity error

  # =====================
  # Build
  # =====================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: code-style
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release

  # =====================
  # Domain Tests
  # =====================
  domain-tests:
    name: Domain Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - name: Run Domain Tests
        run: |
          dotnet test Domain.Tests \
            --configuration Release \
            --logger "trx;LogFileName=Domain.TestResults.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults
      - name: Find Coverage File
        if: always()
        id: domain-coverage-path
        run: |
          FILE=$(find ./TestResults -name "coverage.cobertura.xml" | grep -v "_runner" | head -1)
          echo "path=$FILE" >> $GITHUB_OUTPUT
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Domain Test Results
          path: './TestResults/Domain.TestResults.trx'
          reporter: dotnet-trx
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: domain-coverage
          path: ${{ steps.domain-coverage-path.outputs.path }}
          if-no-files-found: warn

  # =====================
  # Application Tests
  # =====================
  application-tests:
    name: Application Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - name: Run Application Tests
        run: |
          dotnet test Application.Tests \
            --configuration Release \
            --logger "trx;LogFileName=Application.TestResults.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults
      - name: Find Coverage File
        if: always()
        id: application-coverage-path
        run: |
          FILE=$(find ./TestResults -name "coverage.cobertura.xml" | grep -v "_runner" | head -1)
          echo "path=$FILE" >> $GITHUB_OUTPUT
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Application Test Results
          path: './TestResults/Application.TestResults.trx'
          reporter: dotnet-trx
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: application-coverage
          path: ${{ steps.application-coverage-path.outputs.path }}
          if-no-files-found: warn

  # =====================
  # Infrastructure Tests
  # =====================
  infrastructure-tests:
    name: Infrastructure Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - name: Run Infrastructure Tests
        run: |
          dotnet test Infrastructure.Tests \
            --configuration Release \
            --logger "trx;LogFileName=Infrastructure.TestResults.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults
      - name: Find Coverage File
        if: always()
        id: infrastructure-coverage-path
        run: |
          FILE=$(find ./TestResults -name "coverage.cobertura.xml" | grep -v "_runner" | head -1)
          echo "path=$FILE" >> $GITHUB_OUTPUT
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Infrastructure Test Results
          path: './TestResults/Infrastructure.TestResults.trx'
          reporter: dotnet-trx
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: infrastructure-coverage
          path: ${{ steps.infrastructure-coverage-path.outputs.path }}
          if-no-files-found: warn

  # =====================
  # Presentation Tests
  # =====================
  presentation-tests:
    name: Presentation Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - name: Run Presentation Tests
        run: |
          dotnet test Presentation.Tests \
            --configuration Release \
            --logger "trx;LogFileName=Presentation.TestResults.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults
      - name: Find Coverage File
        if: always()
        id: presentation-coverage-path
        run: |
          FILE=$(find ./TestResults -name "coverage.cobertura.xml" | grep -v "_runner" | head -1)
          echo "path=$FILE" >> $GITHUB_OUTPUT
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Presentation Test Results
          path: './TestResults/Presentation.TestResults.trx'
          reporter: dotnet-trx
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: presentation-coverage
          path: ${{ steps.presentation-coverage-path.outputs.path }}
          if-no-files-found: warn

  sonarqube:
    name: SonarQube Analysis
    runs-on: windows-latest
    needs: build
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
  
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
  
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
  
      - name: Cache SonarQube scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner
  
      - name: Install SonarQube scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner
  
      - name: Build and analyze
        shell: powershell
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          $scanner="${{ runner.temp }}\scanner\dotnet-sonarscanner"
          & $scanner begin /k:"FlakDemaj_SLAIS_Backend_Mono" /o:"flakdemaj" /d:sonar.login=$env:SONAR_TOKEN
          dotnet build --configuration Release
          & $scanner end /d:sonar.login=$env:SONAR_TOKEN
