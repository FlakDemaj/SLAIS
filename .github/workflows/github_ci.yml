name: CI

on:
  push:
    branches:
      - '**'        # alle Feature-Branches
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch, in den gemerged werden soll'
        required: true
        default: 'master'

env:
  DOTNET_VERSION: 10.0.x

jobs:

  code-style:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Check Code Style
        run: dotnet format --verify-no-changes --severity error

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: code-style
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore --configuration Release

  domain-tests:
    name: Domain Tests
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Run Domain Tests
        run: dotnet test Domain.Tests/ --no-restore --configuration Release --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        with:
          name: domain-coverage
          path: '**/coverage.cobertura.xml'

  application-tests:
    name: Application Tests
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Run Application Tests
        run: dotnet test Application.Tests/ --no-restore --configuration Release --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        with:
          name: application-coverage
          path: '**/coverage.cobertura.xml'

  infrastructure-tests:
    name: Infrastructure Tests
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Run Infrastructure Tests
        run: dotnet test Infrastructure.Tests/ --no-restore --configuration Release --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        with:
          name: infrastructure-coverage
          path: '**/coverage.cobertura.xml'

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Run Presentation Tests
        run: dotnet test Presentation.Tests/ --no-restore --configuration Release --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: '**/coverage.cobertura.xml'

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [domain-tests, application-tests, infrastructure-tests, api-tests]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.cs.opencover.reportsPaths=**/coverage.cobertura.xml

  merge:
    name: Manual Merge to Target Branch
    runs-on: ubuntu-latest
    needs: [build, domain-tests, application-tests, infrastructure-tests, api-tests, sonarcloud]
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set Target Branch
        run: |
          echo "Merging current branch into ${{ github.event.inputs.target_branch }}"
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git checkout ${{ github.event.inputs.target_branch }}
          git merge $GITHUB_REF_NAME --no-ff -m "Manual merge from $GITHUB_REF_NAME"
          git push origin ${{ github.event.inputs.target_branch }}
