name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  checks: write
  pull-requests: write
  contents: read

env:
  DOTNET_VERSION: 10.0.x

jobs:

  # =====================
  # Code Style Check
  # =====================
  code-style:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Check Code Style
        run: dotnet format --verify-no-changes --severity error

  # =====================
  # Build
  # =====================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: code-style
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore --configuration Release

  # =====================
  # Domain Tests
  # =====================
  domain-tests:
    name: Domain Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Run Domain Tests
        run: dotnet test Domain.Tests --no-restore --configuration Release --logger "trx" --collect:"XPlat Code Coverage"
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Domain Tests
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
          fail-on-error: true
          only-summary: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: domain-coverage
          path: '**/coverage.cobertura.xml'

  # =====================
  # Application Tests
  # =====================
  application-tests:
    name: Application Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Run Application Tests
        run: dotnet test Application.Tests --no-restore --configuration Release --logger "trx" --collect:"XPlat Code Coverage"
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Application Tests
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
          fail-on-error: true
          only-summary: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: application-coverage
          path: '**/coverage.cobertura.xml'

  # =====================
  # Infrastructure Tests
  # =====================
  infrastructure-tests:
    name: Infrastructure Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Run Infrastructure Tests
        run: dotnet test Infrastructure.Tests --no-restore --configuration Release --logger "trx" --collect:"XPlat Code Coverage"
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Infrastructure Tests
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
          fail-on-error: true
          only-summary: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: infrastructure-coverage
          path: '**/coverage.cobertura.xml'

  # =====================
  # Presentation Tests
  # =====================
  presentation-tests:
    name: Presentation Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Run Presentation Tests
        run: dotnet test Presentation.Tests --no-restore --configuration Release --logger "trx" --collect:"XPlat Code Coverage"
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Presentation Tests
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
          fail-on-error: true
          only-summary: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: presentation-coverage
          path: '**/coverage.cobertura.xml'

  # =====================
  # SonarCloud – Coverage + Analyse
  # =====================
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [domain-tests, application-tests, infrastructure-tests, presentation-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download all Coverage Reports
        uses: actions/download-artifact@v4

      - name: Install SonarCloud Scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin SonarCloud Scan
        run: |
          dotnet sonarscanner begin \
            --project-key "${{ secrets.SONAR_PROJECT_KEY }}" \
            --organization "${{ secrets.SONAR_ORGANIZATION }}" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="Coverage/**/*.cobertura.xml" \
            /d:sonar.coverage.minimum=80

      - name: Build for SonarCloud
        run: dotnet build --no-restore --configuration Release

      - name: End SonarCloud Scan
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
