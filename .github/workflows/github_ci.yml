name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  checks: write
  pull-requests: write
  contents: read

env:
  DOTNET_VERSION: 10.0.x

jobs:

  # =====================
  # Code Style
  # =====================
  code-style:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Check Code Style
        run: dotnet format --verify-no-changes --severity error

  # =====================
  # Build
  # =====================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: code-style
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release

  # =====================
  # DOMAIN TESTS
  # =====================
  domain-tests:
    name: Domain Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - name: Run Tests
        run: dotnet test Domain.Tests --configuration Release --logger "trx" --collect:"XPlat Code Coverage"
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Domain Tests
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: domain-coverage
          path: '**/coverage.cobertura.xml'

  # =====================
  # APPLICATION TESTS
  # =====================
  application-tests:
    name: Application Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - name: Run Tests
        run: dotnet test Application.Tests --configuration Release --logger "trx" --collect:"XPlat Code Coverage"
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Application Tests
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: application-coverage
          path: '**/coverage.cobertura.xml'

  # =====================
  # INFRASTRUCTURE TESTS
  # =====================
  infrastructure-tests:
    name: Infrastructure Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - name: Run Tests
        run: dotnet test Infrastructure.Tests --configuration Release --logger "trx" --collect:"XPlat Code Coverage"
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Infrastructure Tests
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: infrastructure-coverage
          path: '**/coverage.cobertura.xml'

  # =====================
  # PRESENTATION TESTS
  # =====================
  presentation-tests:
    name: Presentation Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - name: Run Tests
        run: dotnet test Presentation.Tests --configuration Release --logger "trx" --collect:"XPlat Code Coverage"
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Presentation Tests
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: presentation-coverage
          path: '**/coverage.cobertura.xml'

  # =====================
  # Codacy Analysis + Coverage
  # =====================
  codacy-analysis:
    name: Codacy Coverage
    runs-on: ubuntu-latest
    needs: [ domain-tests, application-tests, infrastructure-tests, presentation-tests ]
    steps:
      - uses: actions/checkout@v4

      - name: List downloaded artifacts
        run: find . -name "*.xml" | sort

      - name: Download all Coverage Artifacts
        uses: actions/download-artifact@v4

      - name: Upload Coverage to Codacy
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: >-
            domain-coverage/coverage.cobertura.xml,
            application-coverage/coverage.cobertura.xml,
            infrastructure-coverage/coverage.cobertura.xml,
            presentation-coverage/coverage.cobertura.xml

