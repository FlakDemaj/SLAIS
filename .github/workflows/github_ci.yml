name: CI

jobs:

  code-style:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Check Code Style
        run: dotnet format --verify-no-changes --severity error || true   # optional fehlschlagen lassen

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: code-style
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore --configuration Release

  domain-tests:
    name: Domain Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Run Domain Tests
        run: dotnet test Domain.Tests --no-restore --configuration Release --logger "trx;LogFileName=TestResults.xml"
      - uses: actions/upload-artifact@v4
        with:
          name: domain-tests-results
          path: Domain.Tests/TestResults.xml
      - uses: dorny/test-reporter@v1
        with:
          name: Domain Tests
          path: Domain.Tests/TestResults.xml
          reporter: dotnet-trx

  domain-tests:
    name: Domain Tests
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Run Domain Tests
        run: dotnet test Domain.Tests/ --no-restore --configuration Release --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        with:
          name: domain-coverage
          path: '**/coverage.cobertura.xml'

  application-tests:
    name: Application Tests
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Run Application Tests
        run: dotnet test Application.Tests/ --no-restore --configuration Release --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        with:
          name: application-coverage
          path: '**/coverage.cobertura.xml'

  infrastructure-tests:
    name: Infrastructure Tests
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Run Infrastructure Tests
        run: dotnet test Infrastructure.Tests/ --no-restore --configuration Release --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        with:
          name: infrastructure-coverage
          path: '**/coverage.cobertura.xml'

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Run Presentation Tests
        run: dotnet test Presentation.Tests/ --no-restore --configuration Release --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: '**/coverage.cobertura.xml'


  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [domain-tests, application-tests, infrastructure-tests, presentation-tests]
    continue-on-error: true   # ← SonarCloud darf Fehler nicht den Workflow stoppen
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  manual-deploy:
    name: Manual Deploy to Master
    runs-on: ubuntu-latest
    needs: sonarcloud
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Merge to Master
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout master
          git merge ${{ github.head_ref }}
          git push origin master
