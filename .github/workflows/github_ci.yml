name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: 10.0.x

jobs:

  code-style:
    name: Code Style
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Check Code Style
        run: dotnet format --verify-no-changes --severity error

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: code-style
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release

  architecture-tests:
    name: Architecture Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - name: Run Architecture Tests
        run: |
          dotnet test Architecture.Tests/Architecture.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=Architecture.TestResults.trx" \
            --results-directory ./TestResults
      - uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc # v1
        if: always()
        with:
          name: Architecture Test Results
          path: './TestResults/Architecture.TestResults.trx'
          reporter: dotnet-trx

  domain-tests:
    name: Domain Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - name: Run Domain Tests
        run: |
          dotnet test Domain.Tests/Domain.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=Domain.TestResults.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
      - name: Find Coverage File
        if: always()
        id: domain-coverage-path
        run: |
          FILE=$(find ./TestResults -name "coverage.opencover.xml" | head -1)
          echo "path=$FILE" >> $GITHUB_OUTPUT
      - uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc # v1
        if: always()
        with:
          name: Domain Test Results
          path: './TestResults/Domain.TestResults.trx'
          reporter: dotnet-trx
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: domain-coverage
          path: ${{ steps.domain-coverage-path.outputs.path }}
          if-no-files-found: warn

  application-tests:
    name: Application Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - name: Run Application Tests
        run: |
          dotnet test Application.Tests/Application.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=Application.TestResults.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
      - name: Find Coverage File
        if: always()
        id: application-coverage-path
        run: |
          FILE=$(find ./TestResults -name "coverage.opencover.xml" | head -1)
          echo "path=$FILE" >> $GITHUB_OUTPUT
      - uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc # v1
        if: always()
        with:
          name: Application Test Results
          path: './TestResults/Application.TestResults.trx'
          reporter: dotnet-trx
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: application-coverage
          path: ${{ steps.application-coverage-path.outputs.path }}
          if-no-files-found: warn

  infrastructure-tests:
    name: Infrastructure Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - name: Run Infrastructure Tests
        run: |
          dotnet test Infrastructure.Tests/Infrastructure.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=Infrastructure.TestResults.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
      - name: Find Coverage File
        if: always()
        id: infrastructure-coverage-path
        run: |
          FILE=$(find ./TestResults -name "coverage.opencover.xml" | head -1)
          echo "path=$FILE" >> $GITHUB_OUTPUT
      - uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc # v1
        if: always()
        with:
          name: Infrastructure Test Results
          path: './TestResults/Infrastructure.TestResults.trx'
          reporter: dotnet-trx
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: infrastructure-coverage
          path: ${{ steps.infrastructure-coverage-path.outputs.path }}
          if-no-files-found: warn

  presentation-tests:
    name: Presentation Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - run: dotnet restore
      - name: Run Presentation Tests
        run: |
          dotnet test Presentation.Tests/Presentation.Tests.csproj \
            --configuration Release \
            --logger "trx;LogFileName=Presentation.TestResults.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
      - name: Find Coverage File
        if: always()
        id: presentation-coverage-path
        run: |
          FILE=$(find ./TestResults -name "coverage.opencover.xml" | head -1)
          echo "path=$FILE" >> $GITHUB_OUTPUT
      - uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc # v1
        if: always()
        with:
          name: Presentation Test Results
          path: './TestResults/Presentation.TestResults.trx'
          reporter: dotnet-trx
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: presentation-coverage
          path: ${{ steps.presentation-coverage-path.outputs.path }}
          if-no-files-found: warn

  sonarqube:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [ build, architecture-tests, domain-tests, application-tests, infrastructure-tests, presentation-tests ]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download Domain Coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: domain-coverage
          path: ./coverage/domain
        continue-on-error: true

      - name: Download Application Coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: application-coverage
          path: ./coverage/application
        continue-on-error: true

      - name: Download Infrastructure Coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: infrastructure-coverage
          path: ./coverage/infrastructure
        continue-on-error: true

      - name: Download Presentation Coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: presentation-coverage
          path: ./coverage/presentation
        continue-on-error: true

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin \
            /k:"FlakDemaj_SLAIS_Backend_Mono" \
            /o:"flakdemaj" \
            /d:sonar.login=$SONAR_TOKEN \
            /d:sonar.qualitygate.wait=true \
            /d:sonar.cs.opencover.reportsPaths="./coverage/**/coverage.opencover.xml"
          dotnet build --configuration Release
          dotnet-sonarscanner end /d:sonar.login=$SONAR_TOKEN

      - name: Generate lightweight summary
        if: always()
        run: |
          REPORT=".sonarqube/out/report-task.txt"
          if [ -f "$REPORT" ]; then
            DASHBOARD=$(grep dashboardUrl $REPORT | cut -d= -f2)
            CETASK=$(grep ceTaskUrl $REPORT | cut -d= -f2)
            echo "### SonarCloud Summary" >> $GITHUB_STEP_SUMMARY
            echo "- Dashboard: $DASHBOARD" >> $GITHUB_STEP_SUMMARY
            echo "- CE Task: $CETASK" >> $GITHUB_STEP_SUMMARY
          else
            echo "Sonar report not found" >> $GITHUB_STEP_SUMMARY
          fi
