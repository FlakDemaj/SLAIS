name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  checks: write
  pull-requests: write
  contents: read
  pages: write
  id-token: write

env:
  DOTNET_VERSION: 10.0.x

jobs:

  # =====================
  # Code Style Check
  # =====================
  code-style:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Check Code Style
        run: dotnet format --verify-no-changes --severity error

  # =====================
  # Build
  # =====================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: code-style
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore --configuration Release

  # =====================
  # Domain Tests
  # =====================
  domain-tests:
    name: Domain Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Run Domain Tests
        run: dotnet test Tests/Domain.Tests --no-restore --configuration Release --logger "trx" --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: domain-tests-results
          path: '**/TestResults/*.trx'
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Domain Tests
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
          fail-on-error: true
          only-summary: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: domain-coverage
          path: '**/coverage.cobertura.xml'

  # =====================
  # Application Tests
  # =====================
  application-tests:
    name: Application Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Run Application Tests
        run: dotnet test Tests/Application.Tests --no-restore --configuration Release --logger "trx" --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: application-tests-results
          path: '**/TestResults/*.trx'
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Application Tests
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
          fail-on-error: true
          only-summary: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: application-coverage
          path: '**/coverage.cobertura.xml'

  # =====================
  # Infrastructure Tests
  # =====================
  infrastructure-tests:
    name: Infrastructure Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Run Infrastructure Tests
        run: dotnet test Tests/Infrastructure.Tests --no-restore --configuration Release --logger "trx" --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: infrastructure-tests-results
          path: '**/TestResults/*.trx'
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Infrastructure Tests
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
          fail-on-error: true
          only-summary: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: infrastructure-coverage
          path: '**/coverage.cobertura.xml'

  # =====================
  # Presentation Tests
  # =====================
  presentation-tests:
    name: Presentation Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Run Presentation Tests
        run: dotnet test Tests/Presentation.Tests --no-restore --configuration Release --logger "trx" --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: presentation-tests-results
          path: '**/TestResults/*.trx'
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Presentation Tests
          path: '**/TestResults/*.trx'
          reporter: dotnet-trx
          fail-on-error: true
          only-summary: false
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: presentation-coverage
          path: '**/coverage.cobertura.xml'

  # =====================
  # Coverage Check
  # =====================
  coverage:
    name: Coverage Check
    runs-on: ubuntu-latest
    needs: [domain-tests, application-tests, infrastructure-tests, presentation-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Download all Coverage Reports
        uses: actions/download-artifact@v4

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate Report
        run: reportgenerator -reports:./**/coverage.cobertura.xml -targetdir:./coverage/report -reporttypes:"Cobertura;Html"

      - name: Enforce 80% Coverage
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage/report/Cobertura.xml
          badge: true
          fail_below_min: true
          thresholds: '80 90'
          output: both
          format: markdown

      - name: Add Coverage to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/report

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./coverage/report

  # =====================
  # Publish Coverage to GitHub Pages
  # =====================
  deploy-coverage:
    name: Publish Coverage Report
    runs-on: ubuntu-latest
    needs: coverage
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # =====================
  # SonarCloud
  # =====================
  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: coverage
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
